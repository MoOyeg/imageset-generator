# Kubernetes Secrets Configuration for ImageSet Automation
# IMPORTANT: This is a template. DO NOT commit actual secrets to git.

---
# Registry pull secret (from OpenShift pull secret or Red Hat)
# Create with:
# kubectl create secret generic redhat-registry-pull-secret \
#   --from-file=.dockerconfigjson=/path/to/pull-secret.json \
#   --type=kubernetes.io/dockerconfigjson \
#   -n openshift-imageset-mirror

# Or extract from OpenShift:
# oc get secret pull-secret -n openshift-config -o json | \
#   jq -r '.data.".dockerconfigjson"' | base64 -d > /tmp/pull-secret.json
# kubectl create secret generic redhat-registry-pull-secret \
#   --from-file=.dockerconfigjson=/tmp/pull-secret.json \
#   --type=kubernetes.io/dockerconfigjson \
#   -n openshift-imageset-mirror

---
# Automation configuration secrets (for notifications, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: automation-secrets
  namespace: openshift-imageset-mirror
type: Opaque
stringData:
  # Email notification settings
  smtp-password: "YOUR_SMTP_PASSWORD"

  # Slack webhook URL
  slack-webhook-url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

  # Generic webhook token
  webhook-token: "YOUR_WEBHOOK_TOKEN"

# Create this secret with:
# kubectl create secret generic automation-secrets \
#   --from-literal=smtp-password="your-password" \
#   --from-literal=slack-webhook-url="your-webhook-url" \
#   --from-literal=webhook-token="your-token" \
#   -n openshift-imageset-mirror
